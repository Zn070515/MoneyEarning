# lighthouserc.yml
ci:
  assert:
    assertions:
      categories:performance:
        - error
        - minScore: 0.9
      first-contentful-paint:
        - warn
        - maxNumericValue: 2000
      interactive:
        - error
        - maxNumericValue: 5000
      total-byte-weight:
        - warn
        - maxNumericValue: 1500000
  collect:
    numberOfRuns: 3
    url:
      - http://localhost:3000/
      - http://localhost:3000/products
