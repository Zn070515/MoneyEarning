[package]
name = "moneyearning"
version = "0.6.0"
edition = "2021"
description = "QuantVault — 本地量化分析工作站，完全离线的A股量化分析桌面工具"
authors = ["QuantVault Team"]
license = "MIT"

[lib]
name = "moneyearning_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-updater = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", features = ["blocking", "rustls-tls"], default-features = false }
csv = "1.3"
rusqlite = { version = "0.31", features = ["bundled"] }
wasm-license = { path = "../../../crates/wasm-license" }
wasm-indicators = { path = "../../../crates/wasm-indicators" }
wasm-backtest = { path = "../../../crates/wasm-backtest" }
wasm-scanner = { path = "../../../crates/wasm-scanner" }
wasm-distribution = { path = "../../../crates/wasm-distribution" }
wasm-core = { path = "../../../crates/wasm-core" }
wasm-pattern = { path = "../../../crates/wasm-pattern" }
wasm-profile = { path = "../../../crates/wasm-profile" }
wasm-custom = { path = "../../../crates/wasm-custom" }
mac_address = "0.1"
hostname = "0.4"
