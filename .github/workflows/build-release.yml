name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.7.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend (just vite)
        run: pnpm --filter @me/app run build:web

      - name: Build Tauri app
        working-directory: packages/app
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuantVault-Windows-msi
          path: packages/app/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: ignore

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuantVault-Windows-exe
          path: packages/app/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download MSI
        uses: actions/download-artifact@v4
        with:
          name: QuantVault-Windows-msi

      - name: Download NSIS
        uses: actions/download-artifact@v4
        with:
          name: QuantVault-Windows-exe

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.version }}" ]; then
              echo "tag=v${{ inputs.version }}" >> $GITHUB_OUTPUT
            else
              echo "tag=latest" >> $GITHUB_OUTPUT
            fi
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          name: "QuantVault ${{ steps.version.outputs.tag }}"
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            *.msi
            *.exe
          draft: false
          prerelease: ${{ steps.version.outputs.tag == 'latest' }}
          generate_release_notes: true
