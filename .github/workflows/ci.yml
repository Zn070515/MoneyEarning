name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Fast checks: lint + typecheck + cargo check ──
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: packages/app/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install frontend deps
        run: cd packages/app && pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: cd packages/app && pnpm typecheck

      - name: ESLint
        run: cd packages/app && pnpm lint

      - name: Cargo check (full workspace)
        run: cargo check --workspace

      - name: Cargo clippy
        run: cargo clippy --workspace -- -D warnings

  # ── Rust tests ──
  test:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo test
        run: cargo test --workspace -- --skip test_winsorize

  # ── Windows installer build ──
  build-windows:
    runs-on: windows-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: packages/app/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: cd packages/app && pnpm install --frozen-lockfile

      - name: Build Tauri app (MSI + NSIS)
        run: cd packages/app && pnpm build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moneyearning-windows-installer
          path: |
            packages/app/src-tauri/target/release/bundle/msi/*.msi
            packages/app/src-tauri/target/release/bundle/nsis/*.exe
